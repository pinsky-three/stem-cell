[tools]
rust = "1.94.1"
node = "22.13.1"
opencode = "latest"

[env]
_.file = ".env"
PORT = "4200"

# ── Codegen ──────────────────────────────────────────────────
# Materializes contract stubs, tests, and registry from systems.yaml.
# Safe to run repeatedly — only overwrites files with @generated-stub marker.

[tasks.codegen]
description = "Generate contract stubs + tests from systems.yaml"
run = "cargo run -p systems-codegen"

[tasks."codegen:force"]
description = "Regenerate all stubs (overwrite even edited files)"
run = "cargo run -p systems-codegen -- --force"

# ── Development ──────────────────────────────────────────────

[tasks.dev]
description = "Codegen → build → run server (PORT=4200)"
depends = ["codegen"]
run = "cargo run -p stem-cell"

[tasks."dev:full"]
description = "Backend + Astro frontend dev server in parallel"
depends = ["codegen", "frontend:install"]
run = """
cargo run -p stem-cell &
BACKEND_PID=$!
cd frontend && npm run dev &
FRONTEND_PID=$!
trap 'kill $BACKEND_PID $FRONTEND_PID 2>/dev/null' EXIT INT TERM
wait
"""

# ── Checks & Linting ────────────────────────────────────────

[tasks.check]
description = "Codegen → type-check (no frontend build)"
depends = ["codegen"]
run = "SKIP_FRONTEND=1 cargo check --workspace --exclude fully-local"

[tasks.lint]
description = "Codegen → clippy on entire workspace (excludes fully-local)"
depends = ["codegen"]
run = "SKIP_FRONTEND=1 cargo clippy --workspace --exclude fully-local"

# ── Testing ──────────────────────────────────────────────────

[tasks.test]
description = "Codegen → run all workspace tests"
depends = ["codegen"]
run = "SKIP_FRONTEND=1 cargo test --workspace --exclude fully-local"

[tasks."test:contracts"]
description = "Run only contract tests"
depends = ["codegen"]
run = "SKIP_FRONTEND=1 cargo test --test contracts"

# ── CI pipeline ──────────────────────────────────────────────

[tasks.ci]
description = "Full CI: codegen → check → clippy → test"
depends = ["codegen"]
run = """
set -e
echo "=== check ==="
SKIP_FRONTEND=1 cargo check --workspace --exclude fully-local
echo "=== clippy ==="
SKIP_FRONTEND=1 cargo clippy --workspace --exclude fully-local -- -D warnings
echo "=== test ==="
SKIP_FRONTEND=1 cargo test --workspace --exclude fully-local
echo "=== all green ==="
"""

# ── Build & Deploy ───────────────────────────────────────────

[tasks.build]
description = "Codegen → release build (frontend + server)"
depends = ["codegen"]
run = "cargo build --release -p stem-cell"

[tasks.docker]
description = "Build Docker image"
run = "docker build -t stem-cell ."

# ── Frontend ─────────────────────────────────────────────────

[tasks."frontend:install"]
description = "Install frontend dependencies"
dir = "frontend"
run = "npm install"

[tasks."frontend:dev"]
description = "Astro dev server with hot reload"
depends = ["frontend:install"]
dir = "frontend"
run = "npm run dev"

# ── OpenCode ──────────────────────────────────────────────────

[tasks."opencode:serve"]
description = "Start OpenCode server (dev/debug, port 14000)"
run = "opencode serve --port 14000"

[tasks."opencode:health"]
description = "Check if an OpenCode server is responding"
run = "curl -sf http://127.0.0.1:14000/global/health && echo ' OK' || echo 'NOT REACHABLE'"

# ── stem CLI ──────────────────────────────────────────────────
# Thin ergonomic wrappers around the stem-cli binary. Run `stem --help`
# for full options; these tasks exist so contributors have a one-liner.

[tasks.stem]
description = "Run the stem CLI (pass subcommand + args)"
run = "cargo run -q -p stem-cli --"

[tasks."stem:doctor"]
description = "Diagnose stem CLI environment (opencode bin, providers, etc.)"
run = "cargo run -q -p stem-cli -- doctor"

[tasks."stem:heal"]
description = "Run check/lint/test and let OpenCode patch failures"
run = "cargo run -q -p stem-cli -- heal"

[tasks."stem:init"]
description = "Scaffold a new stem-cell project (usage: mise run stem:init -- my-app)"
run = "cargo run -q -p stem-cli -- init"

[tasks."stem:clone"]
description = "Clone an existing stem-cell project (usage: mise run stem:clone -- <git-url>)"
run = "cargo run -q -p stem-cli -- clone"

[tasks."fully-local:serve"]
description = "Start fully-local server"
run = "cargo +nightly run -p fully-local"

[tasks."standalone:serve"]
description = "Run standalone stem-cell server"
run = "./target/release/stem-cell"

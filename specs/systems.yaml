version: 1

# ────────────────────────────────────────────────────────────────
# Integrations — external provider contracts
# ────────────────────────────────────────────────────────────────

integrations:

  - name: "ai_provider"
    operations:
      - name: "generate_code"
        input:
          - { name: "prompt",  type: "string" }
          - { name: "context", type: "string" }
        output:
          - { name: "generated_files", type: "string" }
          - { name: "tokens_used",     type: "bigint" }

  - name: "hosting_provider"
    operations:
      - name: "deploy_app"
        input:
          - { name: "project_ref", type: "string" }
          - { name: "subdomain",   type: "string" }
        output:
          - { name: "url",    type: "string" }
          - { name: "status", type: "string" }

  - name: "payment_provider"
    operations:
      - name: "create_subscription"
        input:
          - { name: "plan_ref", type: "string" }
          - { name: "token",    type: "string" }
        output:
          - { name: "subscription_id", type: "string" }
          - { name: "status",          type: "string" }

# ────────────────────────────────────────────────────────────────
# Systems — declarative & contract business workflows
# ────────────────────────────────────────────────────────────────

systems:

  # ── 1. Create a new project with an initial conversation ──────
  - name: "CreateProject"
    description: "Creates a new AI-builder project and its first conversation"
    input:
      - { name: "org_id",      type: "uuid",   required: true }
      - { name: "creator_id",  type: "uuid",   required: true }
      - { name: "name",        type: "string", required: true }
      - { name: "description", type: "string", required: false }
      - { name: "framework",   type: "string", required: false }
    steps:
      - kind: "load_one"
        entity: "Organization"
        by: "input.org_id"
        as: "org"
        not_found: "Organization not found"

      - kind: "guard"
        check: { field: "org.active", equals: true }
        error: "Organization is not active"

      - kind: "load_one"
        entity: "User"
        by: "input.creator_id"
        as: "creator"
        not_found: "Creator user not found"

      - kind: "guard"
        check: { field: "creator.active", equals: true }
        error: "Creator user is not active"

      - kind: "create"
        entity: "Project"
        set:
          - { field: "name",        from: "input.name" }
          - { field: "slug",        from: "input.name" }
          - { field: "description", from: "input.description" }
          - { field: "status",      value: "active" }
          - { field: "framework",   from: "input.framework" }
          - { field: "visibility",  value: "private" }
          - { field: "scope",       value: "frontend" }
          - { field: "active",      value: true }
          - { field: "org_id",      from: "input.org_id" }
          - { field: "creator_id",  from: "input.creator_id" }
        as: "project"

      - kind: "create"
        entity: "Conversation"
        set:
          - { field: "title",      value: "Initial conversation" }
          - { field: "active",     value: true }
          - { field: "project_id", from: "project.id" }
        as: "conversation"

      - kind: "emit_event"
        event: "project_created"
        payload:
          - { field: "project_id",      from: "project.id" }
          - { field: "org_id",          from: "org.id" }
          - { field: "conversation_id", from: "conversation.id" }

    result:
      - { name: "project",      from: "project" }
      - { name: "conversation", from: "conversation" }

  # ── 2. Send a message and queue a build ────────────────────────
  - name: "SendMessage"
    description: "Posts a user message to a conversation and queues an AI build job"
    input:
      - { name: "conversation_id", type: "uuid",   required: true }
      - { name: "author_id",       type: "uuid",   required: true }
      - { name: "content",         type: "string", required: true }
      - { name: "model",           type: "string", required: true }
    steps:
      - kind: "load_one"
        entity: "Conversation"
        by: "input.conversation_id"
        as: "conversation"
        not_found: "Conversation not found"

      - kind: "guard"
        check: { field: "conversation.active", equals: true }
        error: "Conversation is closed"

      - kind: "load_one"
        entity: "Project"
        by: "conversation.project_id"
        as: "project"
        not_found: "Project not found"

      - kind: "guard"
        check: { field: "project.active", equals: true }
        error: "Project is not active"

      - kind: "create"
        entity: "Message"
        set:
          - { field: "role",            value: "user" }
          - { field: "content",         from: "input.content" }
          - { field: "sort_order",      value: 0 }
          - { field: "has_attachment",  value: false }
          - { field: "conversation_id", from: "input.conversation_id" }
          - { field: "author_id",       from: "input.author_id" }
        as: "message"

      - kind: "create"
        entity: "BuildJob"
        set:
          - { field: "status",         value: "queued" }
          - { field: "prompt_summary", from: "input.content" }
          - { field: "model",          from: "input.model" }
          - { field: "tokens_used",    value: 0 }
          - { field: "error_message",  value: "" }
          - { field: "duration_ms",    value: 0 }
          - { field: "logs",           value: "" }
          - { field: "deployment_id",  value: null }
          - { field: "opencode_session_id", value: null }
          - { field: "project_id",     from: "project.id" }
          - { field: "message_id",     from: "message.id" }
        as: "build_job"

      - kind: "emit_event"
        event: "message_sent"
        payload:
          - { field: "message_id",      from: "message.id" }
          - { field: "build_job_id",    from: "build_job.id" }
          - { field: "project_id",      from: "project.id" }
          - { field: "conversation_id", from: "conversation.id" }

    result:
      - { name: "message",   from: "message" }
      - { name: "build_job", from: "build_job" }

  # ── 3. Run a build (contract mode — impl provided by user) ────
  - name: "RunBuild"
    mode: "contract"
    description: "Executes the AI code-generation pipeline: fetches project context, calls the AI provider, and writes artifacts"
    input:
      - { name: "build_job_id", type: "uuid",   required: true }
    output:
      - { name: "artifacts_count", type: "int" }
      - { name: "tokens_used",    type: "bigint" }
      - { name: "status",         type: "string" }
    errors:
      - "BuildJobNotFound"
      - "ProjectNotFound"
      - "AiProviderError(String)"
      - "BuildFailed(String)"

  # ── 4. Deploy a project ────────────────────────────────────────
  - name: "DeployProject"
    description: "Deploys the latest successful build of a project to the hosting provider"
    input:
      - { name: "project_id",    type: "uuid",   required: true }
      - { name: "build_job_id",  type: "uuid",   required: true }
      - { name: "subdomain",     type: "string", required: true }
      - { name: "provider",      type: "string", required: true }
    steps:
      - kind: "load_one"
        entity: "Project"
        by: "input.project_id"
        as: "project"
        not_found: "Project not found"

      - kind: "guard"
        check: { field: "project.active", equals: true }
        error: "Project is not active"

      - kind: "load_one"
        entity: "BuildJob"
        by: "input.build_job_id"
        as: "build_job"
        not_found: "Build job not found"

      - kind: "guard"
        check: { field: "build_job.status", equals: "succeeded" }
        error: "Can only deploy a successful build"

      - kind: "call_integration"
        integration: "hosting_provider"
        operation: "deploy_app"
        input:
          - { param: "project_ref", from: "project.slug" }
          - { param: "subdomain",   from: "input.subdomain" }
        as: "deploy_result"

      - kind: "create"
        entity: "Deployment"
        set:
          - { field: "status",       value: "live" }
          - { field: "url",          from: "deploy_result.url" }
          - { field: "subdomain",    from: "input.subdomain" }
          - { field: "provider",     from: "input.provider" }
          - { field: "port",         value: 0 }
          - { field: "pid",          value: null }
          - { field: "active",       value: true }
          - { field: "project_id",   from: "input.project_id" }
          - { field: "build_job_id", from: "input.build_job_id" }
        as: "deployment"

      - kind: "emit_event"
        event: "project_deployed"
        payload:
          - { field: "deployment_id", from: "deployment.id" }
          - { field: "project_id",    from: "project.id" }
          - { field: "url",           from: "deploy_result.url" }

    result:
      - { name: "deployment", from: "deployment" }

  # ── 5. Upgrade an organization's subscription ──────────────────
  - name: "UpgradeSubscription"
    description: "Changes an organization's plan and processes payment via the payment provider"
    input:
      - { name: "org_id",                type: "uuid",   required: true }
      - { name: "plan_id",               type: "uuid",   required: true }
      - { name: "payment_method_token",  type: "string", required: true }
    steps:
      - kind: "load_one"
        entity: "Organization"
        by: "input.org_id"
        as: "org"
        not_found: "Organization not found"

      - kind: "guard"
        check: { field: "org.active", equals: true }
        error: "Organization is not active"

      - kind: "load_one"
        entity: "Plan"
        by: "input.plan_id"
        as: "plan"
        not_found: "Plan not found"

      - kind: "guard"
        check: { field: "plan.active", equals: true }
        error: "Selected plan is not available"

      - kind: "call_integration"
        integration: "payment_provider"
        operation: "create_subscription"
        input:
          - { param: "plan_ref", from: "plan.slug" }
          - { param: "token",    from: "input.payment_method_token" }
        as: "payment_result"

      - kind: "create"
        entity: "Subscription"
        set:
          - { field: "status",                   value: "active" }
          - { field: "provider_subscription_id", from: "payment_result.subscription_id" }
          - { field: "active",                   value: true }
          - { field: "org_id",                   from: "input.org_id" }
          - { field: "plan_id",                  from: "input.plan_id" }
        as: "subscription"

      - kind: "emit_event"
        event: "subscription_upgraded"
        payload:
          - { field: "subscription_id", from: "subscription.id" }
          - { field: "org_id",          from: "org.id" }
          - { field: "plan_id",         from: "plan.id" }

    result:
      - { name: "subscription", from: "subscription" }

  # ── 6. Cleanup stale deployments ──────────────────────────────
  - name: "CleanupDeployments"
    mode: "contract"
    description: "Stops running deployments older than max_age_minutes, kills their process, and removes the cloned repo from temp"
    input:
      - { name: "max_age_minutes", type: "int",  required: false }
      - { name: "deployment_id",   type: "uuid", required: false }
    output:
      - { name: "cleaned_count", type: "int" }
      - { name: "errors",       type: "string" }
      - { name: "status",       type: "string" }
    errors:
      - "DeploymentNotFound"
      - "CleanupFailed(String)"
      - "DatabaseError(String)"

  # ── 7. Spawn a dev environment in a container ─────────────────
  - name: "SpawnEnvironment"
    mode: "contract"
    description: "Creates a project, queues a build job, and spawns a Podman container to clone a repo and run mise run dev"
    input:
      - { name: "org_id",      type: "uuid",   required: true }
      - { name: "user_id",     type: "uuid",   required: true }
      - { name: "prompt",      type: "string", required: true }
      # When set, appends the prompt to the project's conversation and runs only OpenCode (reuses checkout, deployment, session).
      - { name: "project_id",  type: "uuid",   required: false }
    output:
      - { name: "project_id", type: "string" }
      - { name: "job_id",     type: "string" }
      - { name: "status",     type: "string" }
    errors:
      - "OrgNotFound"
      - "UserNotFound"
      - "SpawnFailed(String)"
      - "DatabaseError(String)"

  # ────────────────────────────────────────────────────────────────
  # GitHub App lifecycle
  # ────────────────────────────────────────────────────────────────
  #
  # Design note: repo authority is a GitHub App *installation*, not a
  # long-lived OAuth repo token. Installations are the unit we connect,
  # refresh, and revoke. Each project maps to at most one active
  # RepoConnection bound to a single installation. All branch/push/PR
  # operations are installation-scoped and mint short-lived installation
  # access tokens on demand (contract-mode: actual GitHub API calls are
  # implemented in the runtime, not modeled declaratively).

  # ── 8. Connect a GitHub App installation ──────────────────────
  - name: "ConnectGithubInstallation"
    mode: "contract"
    description: "Upserts a GitHub App installation for an org (identified by GitHub's installation id). Persists account login, target type, permissions snapshot, and status. Upsert semantics: re-running with the same installation_id refreshes the metadata."
    input:
      - { name: "org_id",            type: "uuid",   required: true }
      - { name: "installer_user_id", type: "uuid",   required: false }
      - { name: "installation_id",   type: "bigint", required: true }
      - { name: "account_login",     type: "string", required: true }
      - { name: "target_type",       type: "string", required: true }
      - { name: "permissions",       type: "string", required: true }
      - { name: "status",            type: "string", required: false }
    output:
      - { name: "github_installation_id", type: "uuid" }
      - { name: "status",                 type: "string" }
      - { name: "active",                 type: "bool" }
    errors:
      - "OrgNotFound"
      - "InvalidTargetType"
      - "InstallationUnverified(String)"
      - "DatabaseError(String)"

  # ── 9. Refresh installation state from GitHub ──────────────────
  - name: "RefreshGithubInstallationState"
    mode: "contract"
    description: "Re-queries GitHub for the current installation state (permissions, suspended/deleted) and updates the record. Marks installation inactive if GitHub reports suspended/deleted. Requires GitHub App JWT signing wiring."
    input:
      - { name: "github_installation_id", type: "uuid", required: true }
    output:
      - { name: "status",      type: "string" }
      - { name: "active",      type: "bool" }
      - { name: "permissions", type: "string" }
    errors:
      - "InstallationNotFound"
      - "GithubApiError(String)"
      - "DatabaseError(String)"

  # ── 10. Connect a repo to a project ────────────────────────────
  - name: "ConnectRepoToProject"
    mode: "contract"
    description: "Binds a GitHub repo to a project via an installation. Enforces the one-active-connection-per-project invariant (deactivates any prior active RepoConnection) and defaults the tracked branch to 'main' when not supplied."
    input:
      - { name: "project_id",             type: "uuid",   required: true }
      - { name: "github_installation_id", type: "uuid",   required: true }
      - { name: "owner",                  type: "string", required: true }
      - { name: "repo",                   type: "string", required: true }
      - { name: "default_branch",         type: "string", required: false }
    output:
      - { name: "repo_connection_id", type: "uuid" }
      - { name: "default_branch",     type: "string" }
      - { name: "status",             type: "string" }
    errors:
      - "ProjectNotFound"
      - "InstallationNotFound"
      - "InstallationInactive"
      - "RepoNotAccessible(String)"
      - "DatabaseError(String)"

  # ── 11. Disconnect a repo from a project ───────────────────────
  - name: "DisconnectRepoFromProject"
    description: "Marks the repo connection inactive. Does not revoke the underlying installation — revocation is a separate owner action on GitHub."
    input:
      - { name: "repo_connection_id", type: "uuid", required: true }
    steps:
      - kind: "load_one"
        entity: "RepoConnection"
        by: "input.repo_connection_id"
        as: "conn"
        not_found: "Repo connection not found"

      - kind: "update"
        entity: "RepoConnection"
        target: "conn.id"
        set:
          - { field: "status", value: "disconnected" }
          - { field: "active", value: false }

      - kind: "emit_event"
        event: "repo_disconnected"
        payload:
          - { field: "repo_connection_id", from: "conn.id" }
          - { field: "project_id",         from: "conn.project_id" }

    result:
      - { name: "repo_connection", from: "conn" }

  # ── 12. Start an experiment branch ─────────────────────────────
  - name: "StartExperimentBranch"
    mode: "contract"
    description: "Generates a deterministic experiment branch name (exp/<project-slug>/<utc-timestamp>) and creates the ref on GitHub using installation-scoped auth. Base is the connection's default branch unless base_sha is supplied."
    input:
      - { name: "project_id", type: "uuid",   required: true }
      - { name: "base_sha",   type: "string", required: false }
    output:
      - { name: "branch_name", type: "string" }
      - { name: "base_branch", type: "string" }
      - { name: "base_sha",    type: "string" }
      - { name: "status",      type: "string" }
    errors:
      - "ProjectNotFound"
      - "RepoNotConnected"
      - "InstallationInactive"
      - "GithubApiError(String)"

  # ── 13. Push project changes to the repo ───────────────────────
  #
  # `source_dir` is the absolute path of the local git checkout to push
  # from (typically the job workspace under /tmp/stem-cell-<job_id>).
  # When `force` is true, the remote ref is overwritten (used for seeding
  # an empty repo from a template mirror). Otherwise a fast-forward push
  # is attempted.
  - name: "PushProjectChangesToRepo"
    mode: "contract"
    description: "Pushes a local checkout to the connected repo on the given branch using a short-lived installation access token. Never stores repo credentials."
    input:
      - { name: "project_id",     type: "uuid",   required: true }
      - { name: "branch_name",    type: "string", required: true }
      - { name: "commit_message", type: "string", required: true }
      - { name: "source_dir",     type: "string", required: true }
      - { name: "force",          type: "bool",   required: false }
    output:
      - { name: "commit_sha", type: "string" }
      - { name: "status",     type: "string" }
    errors:
      - "ProjectNotFound"
      - "RepoNotConnected"
      - "InstallationInactive"
      - "NothingToPush"
      - "PushFailed(String)"
      - "GithubApiError(String)"

  # ── 14. Open an experiment pull request ────────────────────────
  - name: "OpenExperimentPullRequest"
    mode: "contract"
    description: "Opens a pull request from the experiment branch to the repo's default branch via the GitHub API, using installation-scoped auth."
    input:
      - { name: "project_id",  type: "uuid",   required: true }
      - { name: "branch_name", type: "string", required: true }
      - { name: "title",       type: "string", required: true }
      - { name: "body",        type: "string", required: false }
    output:
      - { name: "pr_number", type: "int" }
      - { name: "pr_url",    type: "string" }
      - { name: "status",    type: "string" }
    errors:
      - "ProjectNotFound"
      - "RepoNotConnected"
      - "InstallationInactive"
      - "PullRequestFailed(String)"
      - "GithubApiError(String)"

  # ── 15.a Create a repo from a GitHub template ──────────────────
  #
  # Thin wrapper over `POST /repos/{tpl_owner}/{tpl_repo}/generate` plus a
  # local RepoConnection bind. This is the primary "new project → repo in
  # the user's GitHub account" entrypoint: one call, one repo, one active
  # connection. The installation must already have access to `new_owner`.
  - name: "CreateRepoFromTemplate"
    mode: "contract"
    description: "Creates a new repo in the user's/org's GitHub account from a template and connects it to the project. Uses the installation's access token so no repo PAT is ever needed."
    input:
      - { name: "project_id",             type: "uuid",   required: true }
      - { name: "github_installation_id", type: "uuid",   required: true }
      - { name: "template_owner",         type: "string", required: true }
      - { name: "template_repo",          type: "string", required: true }
      - { name: "new_owner",              type: "string", required: true }
      - { name: "new_name",               type: "string", required: true }
      - { name: "description",            type: "string", required: false }
      - { name: "private",                type: "bool",   required: false }
      - { name: "include_all_branches",   type: "bool",   required: false }
    output:
      - { name: "owner",              type: "string" }
      - { name: "repo",               type: "string" }
      - { name: "default_branch",     type: "string" }
      - { name: "html_url",           type: "string" }
      - { name: "repo_connection_id", type: "uuid" }
      - { name: "status",             type: "string" }
    errors:
      - "ProjectNotFound"
      - "InstallationNotFound"
      - "InstallationInactive"
      - "GithubApiError(String)"
      - "DatabaseError(String)"

  # ── 15. Mark repo lifecycle state ──────────────────────────────
  - name: "MarkRepoLifecycleState"
    description: "Updates the lifecycle state of a repo connection (e.g. 'error', 'connected', 'disconnected'). Used by webhook handlers and reconcilers to keep the local view in sync with GitHub."
    input:
      - { name: "repo_connection_id", type: "uuid",   required: true }
      - { name: "status",             type: "string", required: true }
      - { name: "active",             type: "bool",   required: true }
    steps:
      - kind: "load_one"
        entity: "RepoConnection"
        by: "input.repo_connection_id"
        as: "conn"
        not_found: "Repo connection not found"

      - kind: "update"
        entity: "RepoConnection"
        target: "conn.id"
        set:
          - { field: "status", from: "input.status" }
          - { field: "active", from: "input.active" }

      - kind: "emit_event"
        event: "repo_lifecycle_changed"
        payload:
          - { field: "repo_connection_id", from: "conn.id" }
          - { field: "status",             from: "conn.status" }

    result:
      - { name: "repo_connection", from: "conn" }
